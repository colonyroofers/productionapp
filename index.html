// ─── CALCULATION ENGINE ────────────────────────────────────────────
function calcWastePercent(bldg) {
  const squares = bldg.totalArea / 100;
  if (squares === 0) return 0.15;
  const raw = ((bldg.hips * 2 + bldg.valleys * 3 + bldg.stepFlashing + bldg.rakes) / squares - 3) * 0.82 + 3;
  return Math.max(raw, 0) / 100;
}

function calcBuildingMaterials(bldg, materials, waste) {
  const area = bldg.totalArea;
  const areaWithWaste = area * (1 + waste);
  return {
    shingleBndl: Math.ceil((areaWithWaste / 100) * 3),
    hipRidgeBndl: Math.ceil((bldg.hips + bldg.ridges) / 25),
    starterBndl: Math.ceil((bldg.rakes + bldg.eaves) / 116),
    underlaymentRoll: Math.ceil(area / 950),
    iceWaterRoll: Math.ceil((bldg.valleys + bldg.stepFlashing) / 62),
    ridgeVentEach: Math.ceil(bldg.ridges / 4),
    stepFlashingBox: Math.ceil(bldg.stepFlashing / 60),
    dripEdgeEach: Math.ceil((bldg.eaves + bldg.rakes) / 9.5),
    coilNailBox: Math.round((areaWithWaste / 100) * 400 / 7200),
    capNailBox: Math.round(areaWithWaste / 2000),
    pipeBootEach: bldg.pipes,
    touchPaintEach: bldg.pipes,
    np1Each: bldg.pipes,
  };
}

function calcMaterialCost(qtys, materials) {
  return (
    qtys.shingleBndl * materials.shinglePrice +
    qtys.hipRidgeBndl * materials.hipRidgePrice +
    qtys.starterBndl * materials.starterPrice +
    qtys.underlaymentRoll * materials.underlaymentPrice +
    qtys.iceWaterRoll * materials.iceWaterPrice +
    qtys.ridgeVentEach * materials.ridgeVentPrice +
    qtys.stepFlashingBox * materials.stepFlashingPrice +
    qtys.dripEdgeEach * materials.dripEdgePrice +
    qtys.coilNailBox * materials.coilNailPrice +
    qtys.capNailBox * materials.capNailPrice +
    qtys.pipeBootEach * materials.pipeBootPrice +
    qtys.touchPaintEach * materials.touchPaintPrice +
    qtys.np1Each * materials.np1Price
  );
}

function calcAllBuildings(buildings, materials, labor, equipment, financials) {
  const numBuildings = buildings.length;
  if (numBuildings === 0) return [];

  const forkliftPer = equipment.forkliftCost / numBuildings;
  const dumpsterPer = equipment.dumpsterCost / numBuildings;
  const permitPer = equipment.includePermit ? equipment.permitCost / numBuildings : 0;
  const osbTotal = labor.osbSheets * (labor.osbMaterial + labor.osbLabor);
  const osbPer = osbTotal / numBuildings;

  return buildings.map((bldg) => {
    const waste = calcWastePercent(bldg);
    const qtys = calcBuildingMaterials(bldg, materials, waste);
    const materialCost = calcMaterialCost(qtys, materials);
    const squares = Math.ceil(bldg.totalArea / 100);
    const tearOff = labor.tearOffRate * squares;
    const laborCost = tearOff + forkliftPer + dumpsterPer + permitPer + osbPer;
    const warrantyCost = equipment.extendedWarranty ? equipment.warrantyPerSq * squares : 0;
    const totalLaborEquip = laborCost + warrantyCost;
    const materialTax = materialCost * financials.taxRate;
    const subtotal = materialCost + totalLaborEquip + materialTax;
    const marginAmt = subtotal / (1 - financials.margin) - subtotal;
    const totalPrice = subtotal + marginAmt;
    const squaresWithWaste = bldg.totalArea * (1 + waste) / 100;
    const pricePerSq = squaresWithWaste > 0 ? totalPrice / squaresWithWaste : 0;

    return {
      siteplanNum: bldg.siteplanNum,
      phase: bldg.phase,
      waste,
      qtys,
      materialCost,
      laborCost: totalLaborEquip,
      materialTax,
      marginAmt,
      totalPrice,
      pricePerSq,
      squaresWithWaste,
    };
  });
}

          <Field label="Rep Email" value={project.repEmail} onChange={up("repEmail")} placeholder="jgragg@colonyroofers.com" />
          <Field label="Rep Phone" value={project.repPhone} onChange={up("repPhone")} placeholder="(678) 515-9795" />
        </div>
      </Card>
    </div>
  );
}

// ─── STEP 2: BUILDING MEASUREMENTS (Roofr PDF Import) ─────────────
function Step2({ buildings, setBuildings }) {
  const [uploading, setUploading] = useState(false);
  const [uploadStatus, setUploadStatus] = useState(null); // {type: 'success'|'error', msg: string}
  const [fileName, setFileName] = useState(null);
  const [dragOver, setDragOver] = useState(false);
  const fileInputRef = useRef(null);

  const addBuilding = () => {
    setBuildings((b) => [...b, { ...EMPTY_BUILDING, siteplanNum: String(b.length + 1), roofrNum: String(b.length + 1) }]);
  };
  const removeBuilding = (i) => setBuildings((b) => b.filter((_, j) => j !== i));
  const upField = (i, k) => (e) => {
    const val = e.target.value;
    setBuildings((b) => b.map((bldg, j) => (j === i ? { ...bldg, [k]: k === "siteplanNum" || k === "roofrNum" || k === "predominantPitch" ? val : Number(val) || 0 } : bldg)));
  };

  const extractFromPdf = async (file) => {
    setUploading(true);
    setUploadStatus(null);
    setFileName(file.name);
    let debugInfo = "";

    try {
      // Step 1: Load pdf.js from CDN
      debugInfo = "Step 1: Loading pdf.js...";
      if (!window.pdfjsLib) {
        await new Promise((resolve, reject) => {
          const script = document.createElement("script");
          script.src = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";
          script.onload = () => {
            window.pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
            resolve();
          };
          script.onerror = () => reject(new Error("Failed to load pdf.js"));
          document.head.appendChild(script);
        });
      }
      debugInfo = "Step 1 done. pdf.js loaded.";

      // Step 2: Read PDF file as ArrayBuffer
      debugInfo += "\nStep 2: Reading PDF...";
      const arrayBuffer = await new Promise((res, rej) => {
        const reader = new FileReader();
        reader.onload = () => res(reader.result);
        reader.onerror = () => rej(new Error("Failed to read file"));
        reader.readAsArrayBuffer(file);
      });
      debugInfo += ` Size: ${arrayBuffer.byteLength} bytes`;

      // Step 3: Extract text from all pages
      debugInfo += "\nStep 3: Extracting text...";
      const pdf = await window.pdfjsLib.getDocument({ data: arrayBuffer }).promise;
      const numPages = pdf.numPages;
      debugInfo += ` Pages: ${numPages}`;

      let fullText = "";
      for (let i = 1; i <= numPages; i++) {
        const page = await pdf.getPage(i);
        const textContent = await page.getTextContent();
        const pageText = textContent.items.map((item) => item.str).join(" ");
        fullText += `\n--- PAGE ${i} ---\n${pageText}`;
      }
      debugInfo += `\nExtracted ${fullText.length} chars of text`;
      debugInfo += `\nFirst 300 chars: ${fullText.slice(0, 300)}`;

      if (fullText.trim().length < 50) {
        throw new Error("Could not extract enough text from PDF. The file may be image-only.");
      }

      // Step 4: Parse Roofr text into building data (client-side, no API)
      debugInfo += "\nStep 4: Parsing Roofr format...";

      // Helper: parse "472ft 3in" format to decimal feet
      const parseFtIn = (text, label) => {
        // Match patterns like "Total eaves 472ft 3in" or "Total eaves\n\n472ft 3in"
        const patterns = [
          new RegExp("Total\\s+" + label + "\\s*[:\\s]*(\\d+)ft\\s*(\\d+)in", "i"),
          new RegExp(label + "\\s*[:\\s]*(\\d+)ft\\s*(\\d+)in", "i"),
        ];
        for (const re of patterns) {
          const m = text.match(re);
          if (m) {
            return parseInt(m[1]) + parseInt(m[2]) / 12;
          }
        }
        return 0;
      };

      // Helper: parse "10329 sqft" format
      const parseSqft = (text, label) => {
        const patterns = [
          new RegExp("Total\\s+" + label + "\\s*[:\\s]*([\\d,]+)\\s*sqft", "i"),
          new RegExp(label + "\\s*[:\\s]*([\\d,]+)\\s*sqft", "i"),
        ];
        for (const re of patterns) {
          const m = text.match(re);
          if (m) return parseFloat(m[1].replace(/,/g, ""));
        }
        return 0;
      };

      // Helper: find pitch like "5/12"
      const findPitch = (text) => {
        const m = text.match(/Predominant\s+pitch\s*(\d+\/12)/i);
        if (m) return m[1];
        const m2 = text.match(/(\d+\/12)/);
        return m2 ? m2[1] : "5/12";
      };

      // Split text into per-building sections using "report #X" markers
      const reportPattern = /(?:Summary of all structures from |report\s*#)(\d+)/gi;
      const reportMatches = [];
      let rm;
      while ((rm = reportPattern.exec(fullText)) !== null) {
        reportMatches.push({ num: parseInt(rm[1]), index: rm.index });
      }

      // Deduplicate by building number, keep first occurrence
      const seenNums = new Set();
      const uniqueReports = reportMatches.filter(r => {
        if (seenNums.has(r.num)) return false;
        seenNums.add(r.num);
        return true;
      });

      uniqueReports.sort((a, b) => a.num - b.num);
      debugInfo += `\nFound ${uniqueReports.length} building report sections`;

      // Extract section text for each building
      const buildingSections = uniqueReports.map((r, i) => {
        const start = r.index;
        const end = i + 1 < uniqueReports.length
          ? uniqueReports[i + 1].index
          : fullText.length;
        return { num: r.num, text: fullText.slice(start, end) };
      });

      let newBuildings = [];

      if (buildingSections.length > 0) {
        newBuildings = buildingSections.map((section) => {
          const t = section.text;
          const bldg = {
            siteplanNum: String(section.num),
            roofrNum: String(section.num),
            phase: 1,
            pipes: 0,
            totalArea: parseSqft(t, "roof\\s*area"),
            pitchedArea: parseSqft(t, "pitched\\s*area"),
            flatArea: parseSqft(t, "flat\\s*area"),
            predominantPitch: findPitch(t),
            eaves: parseFloat(parseFtIn(t, "eaves").toFixed(2)),
            valleys: parseFloat(parseFtIn(t, "valleys").toFixed(2)),
            hips: parseFloat(parseFtIn(t, "hips").toFixed(2)),
            ridges: parseFloat(parseFtIn(t, "ridges").toFixed(2)),
            rakes: parseFloat(parseFtIn(t, "rakes").toFixed(2)),
            wallFlashing: parseFloat(parseFtIn(t, "wall\\s*flashing").toFixed(2)),
            stepFlashing: parseFloat(parseFtIn(t, "step\\s*flashing").toFixed(2)),
          };
          return bldg;
        });

        // Filter out entries with zero area (might be duplicates from summary page)
        const validBuildings = newBuildings.filter(b => b.totalArea > 0);
        if (validBuildings.length > 0) {
          newBuildings = validBuildings;
        }
      }

      debugInfo += `\nFinal: ${newBuildings.length} buildings parsed`;

      if (newBuildings.length > 0) {
        const b1 = newBuildings[0];
        debugInfo += `\nBldg 1: area=${b1.totalArea}, eaves=${b1.eaves}, valleys=${b1.valleys}, hips=${b1.hips}, ridges=${b1.ridges}, rakes=${b1.rakes}, wall=${b1.wallFlashing}, step=${b1.stepFlashing}, pitch=${b1.predominantPitch}`;
      }

      if (newBuildings.length === 0) {
        throw new Error("Could not find building data in the PDF. Try adding buildings manually.");
      }

      setBuildings(newBuildings);
      setUploadStatus({
        type: "success",
        msg: `Extracted ${newBuildings.length} building${newBuildings.length > 1 ? "s" : ""} from ${file.name}. Review and adjust — especially pipes per building.`,
      });
    } catch (err) {
      console.error("PDF extraction error:", err, "\nDebug:", debugInfo);
      setUploadStatus({
        type: "error",
        msg: `Failed: ${err.message}`,
        debug: debugInfo,
      });
    } finally {
      setUploading(false);
    }
  };

  const handleFile = (file) => {
    if (!file) return;
    if (file.type !== "application/pdf") {
      setUploadStatus({ type: "error", msg: "Please upload a PDF file (Roofr aerial measurement report)." });
      return;
    }
    extractFromPdf(file);
  };

  const handleDrop = (e) => {
    e.preventDefault();
    setDragOver(false);
    const file = e.dataTransfer?.files?.[0];
    handleFile(file);
  };

  const FIELDS = [
    { key: "siteplanNum", label: "Site#", w: 55 },
    { key: "phase", label: "Phase", w: 55 },
    { key: "totalArea", label: "Total Area", w: 85 },
    { key: "eaves", label: "Eaves", w: 70 },
    { key: "valleys", label: "Valleys", w: 70 },
    { key: "hips", label: "Hips", w: 70 },
    { key: "ridges", label: "Ridges", w: 70 },
    { key: "rakes", label: "Rakes", w: 70 },
    { key: "stepFlashing", label: "Step Fl.", w: 70 },
    { key: "wallFlashing", label: "Wall Fl.", w: 70 },
    { key: "predominantPitch", label: "Pitch", w: 60 },
    { key: "pipes", label: "Pipes", w: 55 },
  ];

  return (
    <div>
      <SectionTitle sub="Upload the Roofr aerial measurement report PDF to auto-extract building data">Building Measurements</SectionTitle>

      {/* Upload Zone */}
      <div
        onDragOver={(e) => { e.preventDefault(); setDragOver(true); }}
        onDragLeave={() => setDragOver(false)}
        onDrop={handleDrop}
        onClick={() => !uploading && fileInputRef.current?.click()}
        style={{
          border: `2px dashed ${dragOver ? BRAND.red : uploading ? BRAND.gray300 : BRAND.navy}`,
          borderRadius: 12,
          padding: uploading ? "32px" : "40px",
          textAlign: "center",
          cursor: uploading ? "default" : "pointer",
          background: dragOver ? "rgba(224,43,43,0.04)" : uploading ? BRAND.gray100 : BRAND.white,
          marginBottom: 20,
          transition: "all 0.2s",
        }}
      >
        <input
          ref={fileInputRef}
          type="file"
          accept=".pdf"
          style={{ display: "none" }}
          onChange={(e) => handleFile(e.target.files?.[0])}
        />
        {uploading ? (
          <div>
            <div style={{ fontSize: 18, marginBottom: 8 }}>
              <span style={{ display: "inline-block", animation: "spin 1s linear infinite", fontSize: 24 }}>⟳</span>
            </div>
            <div style={{ fontWeight: 600, color: BRAND.navy }}>Extracting measurements from {fileName}...</div>
            <div style={{ fontSize: 13, color: BRAND.gray500, marginTop: 4 }}>Reading PDF and parsing building data</div>
            <style>{`@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }`}</style>
          </div>
        ) : (
          <div>
            <div style={{ fontSize: 36, marginBottom: 8, opacity: 0.3 }}>📄</div>
            <div style={{ fontWeight: 700, color: BRAND.navy, fontSize: 15, marginBottom: 4 }}>
              {fileName ? `Replace: ${fileName}` : "Upload Roofr Aerial Measurement Report"}
            </div>
            <div style={{ fontSize: 13, color: BRAND.gray500 }}>
              Drop PDF here or click to browse — measurements will be extracted automatically
            </div>
          </div>
        )}
      </div>

      {/* Status Message */}
      {uploadStatus && (
        <div style={{
          padding: "12px 16px",
          borderRadius: 8,
          marginBottom: 16,
          fontSize: 13,
          background: uploadStatus.type === "success" ? "#ecfdf5" : "#fef2f2",
          color: uploadStatus.type === "success" ? "#065f46" : "#991b1b",
          border: `1px solid ${uploadStatus.type === "success" ? "#a7f3d0" : "#fecaca"}`,
        }}>
          <div>{uploadStatus.type === "success" ? "✓ " : "✕ "}{uploadStatus.msg}</div>
          {uploadStatus.type === "error" && (
            <div style={{ marginTop: 6, fontSize: 12, opacity: 0.8 }}>
              You can add buildings manually below, or try uploading again.
            </div>
          )}
          {uploadStatus.debug && uploadStatus.type === "error" && (
            <details style={{ marginTop: 8 }}>
              <summary style={{ cursor: "pointer", fontSize: 11, fontWeight: 600 }}>Debug Info (tap to expand)</summary>
              <pre style={{ marginTop: 6, padding: 8, background: "#fff5f5", borderRadius: 4, fontSize: 10, whiteSpace: "pre-wrap", wordBreak: "break-all", maxHeight: 200, overflow: "auto" }}>
                {uploadStatus.debug}
              </pre>
            </details>
          )}
        </div>
      )}

      {/* Editable Table */}
      {buildings.length > 0 && (
        <>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
            <span style={{ fontSize: 13, fontWeight: 600, color: BRAND.gray700 }}>
              Review & Edit Extracted Data
            </span>
            <Btn small primary onClick={addBuilding}>+ Add Building</Btn>
          </div>
          <div style={{ overflowX: "auto" }}>
            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
              <thead>
                <tr>
                  {FIELDS.map((f) => (
                    <th key={f.key} style={{ padding: "8px 4px", background: BRAND.navy, color: BRAND.white, fontWeight: 600, fontSize: 11, textTransform: "uppercase", letterSpacing: 0.4, textAlign: "left", whiteSpace: "nowrap" }}>
                      {f.label}
                    </th>
                  ))}
                  <th style={{ padding: "8px 4px", background: BRAND.navy, color: BRAND.white, fontWeight: 600, fontSize: 11, width: 40 }}></th>
                </tr>
              </thead>
              <tbody>
                {buildings.map((bldg, i) => (
                  <tr key={i} style={{ background: i % 2 ? BRAND.gray100 : BRAND.white }}>
                    {FIELDS.map((f) => (
                      <td key={f.key} style={{ padding: 2 }}>
                        <input
                          value={bldg[f.key]}
                          onChange={upField(i, f.key)}
                          type={f.key === "siteplanNum" || f.key === "predominantPitch" ? "text" : "number"}
                          style={{
                            width: f.w,
                            padding: "6px 6px",
                            border: `1px solid ${BRAND.gray200}`,
                            borderRadius: 4,
                            fontSize: 13,
                            background: "transparent",
                            fontFamily: "'SF Mono', 'Consolas', monospace",
                          }}
                        />
                      </td>
                    ))}
                    <td style={{ padding: 2, textAlign: "center" }}>
                      <button onClick={() => removeBuilding(i)} style={{ background: "none", border: "none", color: "#dc2626", cursor: "pointer", fontSize: 16, fontWeight: 700 }}>×</button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <div style={{ marginTop: 12, padding: 12, background: BRAND.gray100, borderRadius: 8, display: "flex", gap: 24, fontSize: 13, color: BRAND.gray700 }}>
            <span><strong>{buildings.length}</strong> buildings</span>
            <span><strong>{buildings.reduce((s, b) => s + b.totalArea, 0).toLocaleString()}</strong> total sqft</span>
            <span><strong>{fmtNum(buildings.reduce((s, b) => s + b.totalArea, 0) / 100, 1)}</strong> total squares</span>
          </div>
        </>
      )}

      {buildings.length === 0 && !uploading && (
        <div style={{ textAlign: "center", padding: 24, color: BRAND.gray400, fontSize: 13 }}>
          Upload a Roofr report above, or{" "}
          <button onClick={addBuilding} style={{ background: "none", border: "none", color: BRAND.red, cursor: "pointer", fontWeight: 600, fontSize: 13, textDecoration: "underline" }}>
            add buildings manually
          </button>
        </div>
      )}
    </div>
  );
}

  return (

            <div style={{ fontSize: 11, color: BRAND.gray500, textTransform: "uppercase", fontWeight: 600, letterSpacing: 0.5 }}>{c.label}</div>
            <div style={{ fontSize: 20, fontWeight: 700, color: c.accent || BRAND.navy, marginTop: 4, fontFamily: "'SF Mono', monospace" }}>{c.val}</div>
          </div>
        ))}
      </div>

      {/* Per Building Table */}
      <Card>
        <h4 style={{ margin: "0 0 12px", fontSize: 14, fontWeight: 700, color: BRAND.navy }}>By Building</h4>
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>

// ─── FIRESTORE STORAGE HELPERS ──────────────────────────────────────
async function saveSubmission(data) {
  const id = data.id || "sub_" + Date.now() + "_" + Math.random().toString(36).slice(2, 8);
  const record = {
    ...data,
    id,
    updatedAt: new Date().toISOString(),
    createdAt: data.createdAt || new Date().toISOString(),
  };
  try {
    const fs = window._fbFs;
    const docRef = fs.doc(firestoreDb, "submissions", id);
    await fs.setDoc(docRef, record);
    return record;
  } catch (e) {
    console.error("Save failed:", e);
    return null;
  }
}

async function loadAllSubmissions() {
  try {
    const fs = window._fbFs;
    const colRef = fs.collection(firestoreDb, "submissions");
    const q = fs.query(colRef, fs.orderBy("createdAt", "desc"));
    const snapshot = await fs.getDocs(q);
    const subs = [];
    snapshot.forEach((doc) => subs.push(doc.data()));
    return subs;
  } catch (e) {
    console.error("Load failed:", e);
    return [];
  }
}

async function deleteSubmission(id) {
  try {
    const fs = window._fbFs;
    const docRef = fs.doc(firestoreDb, "submissions", id);
    await fs.deleteDoc(docRef);
    return true;
  } catch (e) {
    console.error("Delete failed:", e);
    return false;
  }
}

// ─── SUBMISSIONS LIST ──────────────────────────────────────────────
function SubmissionsList({ onLoad, onNew }) {
  const [submissions, setSubmissions] = useState([]);
  const [loading, setLoading] = useState(true);
  const [filter, setFilter] = useState("all");

  const refresh = async () => {
    setLoading(true);
    const subs = await loadAllSubmissions();
    setSubmissions(subs);
    setLoading(false);
  };

  // Refresh on mount
  const mountRef = useRef(false);
  if (!mountRef.current) {
    mountRef.current = true;
    refresh();
  }

  const filtered = filter === "all" ? submissions : submissions.filter(s => s.status === filter);

  const handleDelete = async (id, name) => {
    if (confirm(`Delete submission "${name}"? This cannot be undone.`)) {
      await deleteSubmission(id);
      refresh();

  const counts = {
    all: submissions.length,
    pending: submissions.filter(s => s.status === "pending").length,

        {[
          { key: "all", label: "All" },

                  padding: "6px 14px", borderRadius: 6, border: `2px solid ${status === s ? BRAND.navy : BRAND.gray300}`,
                  background: status === s ? BRAND.navy : BRAND.white, color: status === s ? BRAND.white : BRAND.gray700,
                  fontSize: 12, fontWeight: 600, cursor: "pointer", textTransform: "capitalize", fontFamily: "inherit",
                }}
              >
                {s === "pending" ? "Pending" : s === "approved" ? "Approve" : "Reject"}
              </button>
            ))}
          </div>
        </div>
        <Field label="Reviewer Name" value={reviewerName} onChange={(e) => setReviewerName(e.target.value)} placeholder="Lead Estimator" />
        <div style={{ display: "flex", alignItems: "flex-end" }}>
          <Btn primary onClick={handleSaveReview} disabled={saving} style={{ width: "100%" }}>
            {saving ? "Saving..." : saved ? "✓ Saved" : "Save Review"}
          </Btn>
        </div>
      </div>

      <div>
        <label style={{ fontSize: 11, fontWeight: 600, color: BRAND.gray500, textTransform: "uppercase", display: "block", marginBottom: 4 }}>
          Review Notes
        </label>
        <textarea
          value={notes}
          onChange={(e) => setNotes(e.target.value)}
          placeholder="Add notes about pricing accuracy, adjustments needed, etc."
          style={{
            width: "100%", padding: 10, border: `1px solid ${BRAND.gray300}`, borderRadius: 6,
            fontSize: 13, minHeight: 60, fontFamily: "inherit", resize: "vertical",
          }}
        />
      </div>
    </div>
  );
}

// ─── MAIN APP ──────────────────────────────────────────────────────
const STEPS = ["Project Info", "Measurements", "Pricing", "Review", "Proposal"];

function PricingTool({ user, onSignOut }) {
  const [mode, setMode] = useState("submissions"); // "submissions" | "editor"
  const [step, setStep] = useState(0);
  const [loadedSubmission, setLoadedSubmission] = useState(null); // if editing a saved one
  const [project, setProject] = useState({
    jobName: "",
    date: new Date().toISOString().split("T")[0],
    clientName: "",
    clientEmail: "",
    address: "",
    cityStateZip: "",
    companyName: "",
    market: "atlanta",
    repName: "",
    repEmail: "",
    repPhone: "",
  });
  const [buildings, setBuildings] = useState([]);
  const [materials, setMaterials] = useState({ ...DEFAULT_MATERIALS });
  const [labor, setLabor] = useState({ ...DEFAULT_LABOR });
  const [equipment, setEquipment] = useState({ ...DEFAULT_EQUIPMENT });
  const [financials, setFinancials] = useState({ ...DEFAULT_FINANCIALS });
  const [saveStatus, setSaveStatus] = useState(null);

  const results = useMemo(
    () => calcAllBuildings(buildings, materials, labor, equipment, financials),
    [buildings, materials, labor, equipment, financials]
  );

  const totalPrice = results.reduce((s, r) => s + r.totalPrice, 0);

  const canAdvance = Math.max(step, buildings.length > 0 ? 4 : project.jobName ? 1 : 0);

  // Reset form for new estimate
  const handleNew = () => {
    setLoadedSubmission(null);
    setProject({
      jobName: "", date: new Date().toISOString().split("T")[0],
      clientName: "", clientEmail: "", address: "", cityStateZip: "",
      companyName: "", market: "atlanta", repName: "", repEmail: "", repPhone: "",
    });
    setBuildings([]);
    setMaterials({ ...DEFAULT_MATERIALS });
    setLabor({ ...DEFAULT_LABOR });
    setEquipment({ ...DEFAULT_EQUIPMENT });
    setFinancials({ ...DEFAULT_FINANCIALS });
    setStep(0);
    setMode("editor");
    setSaveStatus(null);
  };

  // Load a submission into the editor
  const handleLoad = (sub) => {
    setLoadedSubmission(sub);
    setProject(sub.project || {});
    setBuildings(sub.buildings || []);
    setMaterials(sub.materials || { ...DEFAULT_MATERIALS });
    setLabor(sub.labor || { ...DEFAULT_LABOR });
    setEquipment(sub.equipment || { ...DEFAULT_EQUIPMENT });
    setFinancials(sub.financials || { ...DEFAULT_FINANCIALS });
    setStep(3); // Go to Review step
    setMode("editor");
    setSaveStatus(null);
  };

  // Save current state as submission
  const handleSave = async (status = "pending") => {
    setSaveStatus("saving");
    const submitterName = user?.name || project.repName || "Unknown";
    const record = {
      id: loadedSubmission?.id || undefined,
      createdAt: loadedSubmission?.createdAt || undefined,
      status: loadedSubmission?.status || status,
      reviewNotes: loadedSubmission?.reviewNotes || "",
      reviewedBy: loadedSubmission?.reviewedBy || "",
      reviewedAt: loadedSubmission?.reviewedAt || "",
      submittedBy: loadedSubmission?.submittedBy || submitterName,
      project,
      buildings,
      materials,
      labor,
      equipment,
      financials,
      results,
      totalPrice,
    };
    const saved = await saveSubmission(record);
    if (saved) {
      setLoadedSubmission(saved);
      setSaveStatus("saved");
      setTimeout(() => setSaveStatus(null), 3000);
    } else {
      setSaveStatus("error");
    }
  };

  // Handle review save (update the loaded submission)
  const handleReviewSave = (updated) => {
    setLoadedSubmission(updated);
  };

  return (
    <div style={{ minHeight: "100vh", background: BRAND.cream, fontFamily: "'Segoe UI', 'Inter', system-ui, sans-serif" }}>
      {/* Header */}
      <div style={{ background: BRAND.navy, padding: "16px 32px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
          <div style={{ color: BRAND.white }}>
            <div style={{ fontSize: 20, fontWeight: 700, letterSpacing: 1.5 }}>COLONY ROOFERS</div>
            <div style={{ fontSize: 11, opacity: 0.6, letterSpacing: 0.5, marginTop: 2 }}>SHINGLE REPLACEMENT PRICING TOOL</div>
          </div>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          {mode === "editor" && results.length > 0 && (
            <div style={{ color: BRAND.white, textAlign: "right", marginRight: 12 }}>
              <div style={{ fontSize: 11, opacity: 0.6 }}>TOTAL PRICE</div>
              <div style={{ fontSize: 22, fontWeight: 700, fontFamily: "'SF Mono', monospace" }}>
                {fmt(totalPrice)}
              </div>
            </div>
          )}
          {mode === "editor" && (
            <button
              onClick={() => setMode("submissions")}
              style={{
                padding: "8px 16px", background: "rgba(255,255,255,0.15)", border: "1px solid rgba(255,255,255,0.3)",
                borderRadius: 6, color: BRAND.white, fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: "inherit",
              }}
            >
              📋 Submissions
            </button>
          )}
          {/* User info */}
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginLeft: 8 }}>
            {user?.picture ? (
              <img src={user.picture} alt="" style={{ width: 30, height: 30, borderRadius: 15, border: "2px solid rgba(255,255,255,0.3)" }} referrerPolicy="no-referrer" />
            ) : (
              <div style={{ width: 30, height: 30, borderRadius: 15, background: "rgba(255,255,255,0.2)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14, color: BRAND.white }}>
                {(user?.name || "?")[0]}
              </div>
            )}
            <div style={{ color: BRAND.white, lineHeight: 1.2 }}>
              <div style={{ fontSize: 12, fontWeight: 600 }}>{user?.name}</div>
              <button
                onClick={onSignOut}
                style={{ background: "none", border: "none", color: "rgba(255,255,255,0.5)", fontSize: 10, cursor: "pointer", padding: 0, fontFamily: "inherit" }}
              >
                Sign Out
              </button>
            </div>
          </div>
        </div>
      </div>

      {/* Body */}
      <div style={{ maxWidth: 1200, margin: "0 auto", padding: "0 24px 48px" }}>
        {mode === "submissions" ? (
          <div style={{ paddingTop: 24 }}>
            <SubmissionsList onLoad={handleLoad} onNew={handleNew} />
          </div>
        ) : (
          <>
            <StepNav steps={STEPS} current={step} setCurrent={setStep} canAdvance={canAdvance} />

            {/* Review Panel for loaded submissions */}
            {loadedSubmission && (
              <ReviewPanel
                submission={loadedSubmission}
                onSave={handleReviewSave}
                onBack={() => setMode("submissions")}
              />
            )}

            {step === 0 && <Step1 project={project} setProject={setProject} />}
            {step === 1 && <Step2 buildings={buildings} setBuildings={setBuildings} />}
            {step === 2 && <Step3 materials={materials} setMaterials={setMaterials} labor={labor} setLabor={setLabor} equipment={equipment} setEquipment={setEquipment} financials={financials} setFinancials={setFinancials} />}
            {step === 3 && <Step4 results={results} buildings={buildings} financials={financials} />}
            {step === 4 && <Step5 project={project} results={results} buildings={buildings} />}

            {/* Navigation + Save */}
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 32 }}>
              <Btn onClick={() => setStep((s) => Math.max(0, s - 1))} disabled={step === 0}>
                ← Previous
              </Btn>
              <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                {saveStatus === "saved" && (
                  <span style={{ fontSize: 13, color: "#065f46", fontWeight: 600 }}>✓ Saved</span>
                )}
                {saveStatus === "error" && (
                  <span style={{ fontSize: 13, color: "#991b1b", fontWeight: 600 }}>Save failed</span>
                )}
                {results.length > 0 && (
                  <Btn
                    onClick={() => handleSave("pending")}
                    disabled={saveStatus === "saving"}
                    style={{ background: "#065f46", color: BRAND.white, border: "none" }}
                  >
                    {saveStatus === "saving" ? "Saving..." : loadedSubmission ? "Save Changes" : "Save & Submit for Review"}
                  </Btn>
                )}
                {step < STEPS.length - 1 && (
                  <Btn primary onClick={() => setStep((s) => Math.min(STEPS.length - 1, s + 1))}>
                    Next →
                  </Btn>
                )}
              </div>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

// ─── ROOT APP WITH FIREBASE AUTH ───────────────────────────────────
function App() {
  const { user, loading, error, signIn, signOut } = useFirebaseAuth();

  if (loading) {
    return (
      <div style={{
        minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center",
        background: "linear-gradient(135deg, #1a2744 0%, #2a3d66 100%)",
        color: "rgba(255,255,255,0.6)", fontSize: 14, fontFamily: "'Segoe UI', system-ui, sans-serif",
      }}>
        Loading...
      </div>
    );
  }

  if (!user) {
    return <LoginScreen onSignIn={signIn} loading={loading} error={error} />;
  }

  return <PricingTool user={user} onSignOut={signOut} />;
}

// ─── MOUNT ─────────────────────────────────────────────────────────
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
  </script>
</body>
